services:
  ollama:
    image: ollama/ollama:latest
    container_name: codalf-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  codalf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codalf
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL=qwen:14b
    volumes:
      - .:/app
    working_dir: /app
    stdin_open: true
    tty: true

volumes:
  ollama-data:
